<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Plan System - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#1e293b);
}

.container{
    width:100%;
    max-width:420px;
    padding:20px;
}

.login-card{
    background:white;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.logo{
    text-align:center;
    margin-bottom:30px;
}

.logo h1{
    color:#2563eb;
    font-size:32px;
}

.logo p{
    color:#64748b;
    margin-top:5px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#334155;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    border:1px solid #cbd5e1;
    border-radius:10px;
    outline:none;
    transition:.3s;
}

input:focus{
    border-color:#2563eb;
    box-shadow:0 0 8px rgba(37,99,235,.3);
}

.btn{
    width:100%;
    padding:14px;
    border:none;
    background:#2563eb;
    color:white;
    border-radius:10px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.options{
    margin-top:15px;
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

.options a{
    text-decoration:none;
    color:#2563eb;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#64748b;
    font-size:13px;
}

</style>
</head>
<body>

<div class="container">

<div class="login-card">

<div class="logo">
<h1>📚 Lesson Plan</h1>
<p>Teacher Management System</p>
</div>

<form action="index.html">

<div class="form-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" placeholder="Enter password" required>
</div>

<button class="btn" type="submit">
Login
</button>

<div class="options">
<a href="#">Forgot Password?</a>
<a href="#">Contact Admin</a>
</div>

</form>

<div class="footer">
© 2026 Lesson Plan System
</div>

</div>

</div>

</body>
</html>
