<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Plan - System</title>

<style>
:root{
    --bg:#f4f7fb;
    --card:#fff;
    --text:#0f172a;
    --primary:#2563eb;
    --success:#16a34a;
    --shadow:0 10px 25px rgba(0,0,0,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI;
}

body{
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:var(--card);
    box-shadow:var(--shadow);
}

.btn{
    background:var(--primary);
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}

/* CONTAINER */
.container{
    display:grid;
    grid-template-columns:2fr 1fr;
    gap:20px;
    padding:20px;
}

/* FORM */
.form-box{
    background:var(--card);
    padding:20px;
    border-radius:15px;
    box-shadow:var(--shadow);
}

label{
    font-weight:600;
    margin-top:10px;
    display:block;
}

input, select, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid #ccc;
    outline:none;
}

textarea{
    resize:none;
    height:80px;
}

/* PREVIEW */
.preview{
    background:var(--card);
    padding:20px;
    border-radius:15px;
    box-shadow:var(--shadow);
}

.preview h3{
    margin-bottom:10px;
}

/* CARD STYLE */
.card{
    padding:10px;
    border-left:4px solid var(--primary);
    margin-bottom:10px;
    background:#f8fafc;
    border-radius:8px;
}

/* RESPONSIVE */
@media(max-width:900px){
.container{
    grid-template-columns:1fr;
}
}
</style>
</head>

<body>

<div class="header">
<h2>📝 Lesson Plan Creator</h2>
<button class="btn" onclick="savePlan()">Save Plan</button>
</div>

<div class="container">

<!-- FORM -->
<div class="form-box">

<label>Teacher</label>
<select id="teacher">
<option>John Doe</option>
<option>Alice</option>
<option>David</option>
</select>

<label>Subject</label>
<select id="subject">
<option>Mathematics</option>
<option>English</option>
<option>Biology</option>
</select>

<label>Class</label>
<select id="class">
<option>S1</option>
<option>S2</option>
<option>P6</option>
</select>

<label>Topic</label>
<input type="text" id="topic" placeholder="Enter topic">

<label>Objectives</label>
<textarea id="objectives"></textarea>

<label>Teaching Materials</label>
<textarea id="materials"></textarea>

<label>Activities</label>
<textarea id="activities"></textarea>

<label>Assessment</label>
<textarea id="assessment"></textarea>

</div>

<!-- PREVIEW -->
<div class="preview">
<h3>📌 Live Preview</h3>

<div class="card" id="p_teacher">Teacher: -</div>
<div class="card" id="p_subject">Subject: -</div>
<div class="card" id="p_class">Class: -</div>
<div class="card" id="p_topic">Topic: -</div>
<div class="card" id="p_objectives">Objectives: -</div>
<div class="card" id="p_materials">Materials: -</div>
<div class="card" id="p_activities">Activities: -</div>
<div class="card" id="p_assessment">Assessment: -</div>

</div>

</div>

<script>

// LIVE PREVIEW
document.querySelectorAll("input,textarea,select").forEach(el=>{
el.addEventListener("input", updatePreview);
});

function updatePreview(){
document.getElementById("p_teacher").innerText="Teacher: "+document.getElementById("teacher").value;
document.getElementById("p_subject").innerText="Subject: "+document.getElementById("subject").value;
document.getElementById("p_class").innerText="Class: "+document.getElementById("class").value;
document.getElementById("p_topic").innerText="Topic: "+document.getElementById("topic").value;
document.getElementById("p_objectives").innerText="Objectives: "+document.getElementById("objectives").value;
document.getElementById("p_materials").innerText="Materials: "+document.getElementById("materials").value;
document.getElementById("p_activities").innerText="Activities: "+document.getElementById("activities").value;
document.getElementById("p_assessment").innerText="Assessment: "+document.getElementById("assessment").value;
}

// SAVE (demo)
function savePlan(){
alert("Lesson Plan Saved Successfully ✅");
}

</script>

</body>
</html>
