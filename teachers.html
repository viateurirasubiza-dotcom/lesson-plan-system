<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teachers - Lesson Plan System</title>

<style>
:root{
    --bg:#f4f7fb;
    --card:#fff;
    --text:#0f172a;
    --primary:#2563eb;
    --danger:#dc2626;
    --success:#16a34a;
    --shadow:0 10px 25px rgba(0,0,0,.08);
}

body{
    margin:0;
    font-family:Segoe UI;
    background:var(--bg);
    color:var(--text);
}

/* TOP BAR */
.topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px;
    background:var(--card);
    box-shadow:var(--shadow);
}

.btn{
    background:var(--primary);
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:10px;
    cursor:pointer;
}

.container{
    padding:20px;
}

/* SEARCH */
.search{
    margin:20px 0;
}

.search input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ccc;
}

/* TABLE */
table{
    width:100%;
    border-collapse:collapse;
    background:var(--card);
    border-radius:10px;
    overflow:hidden;
    box-shadow:var(--shadow);
}

th{
    background:var(--primary);
    color:white;
    padding:12px;
}

td{
    padding:12px;
    border-bottom:1px solid #eee;
}

.action-btn{
    padding:6px 10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

.edit{
    background:var(--success);
    color:white;
}

.delete{
    background:var(--danger);
    color:white;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:white;
    padding:20px;
    border-radius:15px;
    width:350px;
}

.modal input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:10px;
}

.close{
    float:right;
    cursor:pointer;
    font-size:20px;
}
</style>
</head>

<body>

<div class="topbar">
    <h2>👨‍🏫 Teachers</h2>
    <button class="btn" onclick="openModal()">+ Add Teacher</button>
</div>

<div class="container">

<div class="search">
    <input type="text" id="search" onkeyup="searchTeacher()" placeholder="Search teacher...">
</div>

<table id="table">
<tr>
    <th>Name</th>
    <th>Email</th>
    <th>Subject</th>
    <th>Action</th>
</tr>

<tr>
    <td>John Doe</td>
    <td>john@gmail.com</td>
    <td>Math</td>
    <td>
        <button class="action-btn edit">Edit</button>
        <button class="action-btn delete">Delete</button>
    </td>
</tr>

<tr>
    <td>Alice</td>
    <td>alice@gmail.com</td>
    <td>English</td>
    <td>
        <button class="action-btn edit">Edit</button>
        <button class="action-btn delete">Delete</button>
    </td>
</tr>

</table>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<span class="close" onclick="closeModal()">&times;</span>

<h3>Add Teacher</h3>

<input type="text" id="name" placeholder="Name">
<input type="email" id="email" placeholder="Email">
<input type="text" id="subject" placeholder="Subject">

<button class="btn" onclick="addTeacher()">Save</button>

</div>
</div>

<script>

function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

function addTeacher(){
    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;
    let subject=document.getElementById("subject").value;

    if(name && email && subject){
        let table=document.getElementById("table");

        let row=table.insertRow();

        row.innerHTML=`
        <td>${name}</td>
        <td>${email}</td>
        <td>${subject}</td>
        <td>
        <button class="action-btn edit">Edit</button>
        <button class="action-btn delete">Delete</button>
        </td>
        `;

        closeModal();
    }
}

function searchTeacher(){
    let input=document.getElementById("search").value.toLowerCase();
    let rows=document.querySelectorAll("#table tr");

    rows.forEach((row,index)=>{
        if(index===0) return;

        let name=row.cells[0].innerText.toLowerCase();
        row.style.display=name.includes(input) ? "" : "none";
    });
}
</script>

</body>
</html>
